# UXSniffer message bundle
# All user-visible inspection messages are defined here with codes.
# Format: inspection.<code>.<variant>=message with {0}, {1} placeholders

# Tool Window
toolWindow.placeholder=Open a frontend file to run UX smell inspections.

# --- Inspection display names ---
inspection.large.file.name=Large file
inspection.large.component.name=Large component
inspection.too.many.props.name=Too many props
inspection.direct.dom.name=Direct DOM manipulation
inspection.force.update.name=Force update / page reload
inspection.props.initial.state.name=Props used in initial state
inspection.uncontrolled.component.name=Uncontrolled form component
inspection.inheritance.name=Inheritance instead of composition
inspection.any.type.name=Any type usage
inspection.non.null.assertion.name=Non-null assertion
inspection.multiple.booleans.name=Multiple booleans for state
inspection.enum.implicit.name=Enum with implicit values

# --- Inspection group ---
inspection.group.name=UX Smells

# --- S01: Large File ---
inspection.large.file.both=Large file: {0} lines (threshold: {1}) and {2} imports (threshold: {3}). Consider splitting into smaller components.
inspection.large.file.loc=Large file: {0} lines (threshold: {1}). Consider splitting into smaller components.
inspection.large.file.imports=Too many imports: {0} (threshold: {1}). This file may be taking on too many responsibilities.

# --- S02: Large Component ---
inspection.large.component.both=Large component: script block has {0} lines (threshold: {1}) and {2} functions (threshold: {3}). Consider splitting logic into composables.
inspection.large.component.loc=Large component: script block has {0} lines (threshold: {1}). Consider splitting logic into composables.
inspection.large.component.functions=Large component: {0} functions defined (threshold: {1}). Consider extracting logic into composables.

# --- S03: Too Many Props ---
inspection.too.many.props.message=Too many props: {0} defined (threshold: {1}). Consider grouping related props into objects or splitting the component.

# --- S04: Direct DOM Manipulation ---
inspection.direct.dom.single=Direct DOM manipulation via ''{0}''. Use framework-provided refs or reactive bindings instead.
inspection.direct.dom.multiple=Direct DOM manipulation via {0}. Use framework-provided refs or reactive bindings instead.

# --- S05: Force Update ---
inspection.force.update.forceUpdate=Avoid '$forceUpdate()'. Redesign state so the framework''s reactivity handles updates automatically.
inspection.force.update.reload=Avoid 'location.reload()'. Use the framework''s reactivity or programmatic navigation instead of full page reloads.
inspection.force.update.both=Avoid '$forceUpdate()' and 'location.reload()'. Redesign state so the framework''s reactivity handles updates automatically.

# --- S06: Props in Initial State ---
inspection.props.initial.state.single=Prop ''{0}'' used to initialise reactive state. Use computed(() => props.{1}) to stay in sync.
inspection.props.initial.state.multiple=Props {0} used to initialise reactive state. Use computed() to stay in sync with prop changes.

# --- S07: Uncontrolled Component ---
inspection.uncontrolled.single=Uncontrolled <{0}>: uses a ref but has no v-model or :value binding. Bind the value reactively instead.
inspection.uncontrolled.multiple={0} uncontrolled form elements use a ref but have no v-model or :value binding. Bind values reactively instead.

# --- S08: Inheritance ---
inspection.inheritance.message=Inheritance via ''extends: {0}'' detected. Prefer composables or component composition over class-style inheritance.

# --- S09: Any Type ---
inspection.any.type.single=TypeScript 'any' type used. This disables type checking and may hide errors. Define explicit types instead.
inspection.any.type.multiple=TypeScript ''any'' type used {0} times. This disables type checking and may hide errors. Define explicit types instead.

# --- S10: Non-Null Assertion ---
inspection.non.null.single=Non-null assertion operator ('!') used. This may hide null/undefined errors at runtime. Use proper null checks instead.
inspection.non.null.multiple=Non-null assertion operator (''!'') used {0} times. This may hide null/undefined errors at runtime. Use proper null checks instead.

# --- S11: Multiple Booleans ---
inspection.multiple.booleans.message=Multiple booleans for state: {0} boolean refs defined (threshold: {1}). Consider using an enum or union type to manage state transitions instead.

# --- S12: Enum Implicit Values ---
inspection.enum.implicit.single=Enum ''{0}'' has implicit values. Assign explicit values to prevent reordering issues.
inspection.enum.implicit.multiple=Enums {0} have implicit values. Assign explicit values to prevent reordering issues.